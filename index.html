<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY BIRTHDAY BEBU</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f06292;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 2; /* Keeps the envelope base on top of the hidden letter */
        }

        /* The Front Flap */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 4; /* Keeps the flap above everything else when closed */
            border-top: 130px solid #ec407a;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        .letter {
            position: absolute;
            bottom: 10px;
            left: 10%;
            width: 80%;
            height: 80%;
            background: white;
            padding: 20px;
            text-align: center;
            transition: transform 0.6s ease, opacity 0.4s ease;
            z-index: 1; /* Tucked behind the envelope front */
            opacity: 0; /* HIDDEN BY DEFAULT */
            box-sizing: border-box;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }

        /* Animation when clicked */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0; /* Moves flap behind once opened */
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-130px);
            z-index: 5; /* Brings letter to the very front */
            opacity: 1; /* REVEALS THE TEXT */
            height: auto;
            min-height: 220px;
        }

        .heart {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 35px;
            z-index: 6;
            transition: opacity 0.3s;
        }

        .envelope-wrapper.open .heart {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="heart">❤️</div>
        <div class="envelope">
            <div class="letter">I love youu</h2>
                <p style="font-size: 15px; color: #444;">Thank you for existing</p>
                <p style="font-size: 15px; color: #444;">You mean so much to me, and I appreciate everything about you.</p>
                <p><strong>From,</strong><br>your bebu</p>
            </div>
        </div>
    </div>

</body>
</html>
