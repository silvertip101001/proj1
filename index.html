<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Something For You</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec; /* Soft Pink */
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f06292;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* The Flap */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-top: 130px solid #ec407a;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        /* The Letter inside */
        .letter {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 80%;
            background: white;
            padding: 20px;
            text-align: center;
            transition: transform 0.5s;
            z-index: 1;
            box-sizing: border-box;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }

        .letter h2 { color: #880e4f; margin-top: 0; }
        .letter p { font-size: 14px; color: #444; line-height: 1.5; }

        /* Animation when clicked */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-120px);
            z-index: 3;
            height: auto;
            min-height: 250px;
        }

        .heart {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 30px;
            z-index: 4;
            transition: opacity 0.3s;
        }

        .envelope-wrapper.open .heart {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="heart">❤️</div>
        <div class="envelope">
            <div class="letter">
                <h2>HAPPY BIRTHDAY BEBU</h2>
                <p>Thank you for existing and being mine.</p>
                <p>You mean so much to me, and I appreciate everything about you.</p>
                <p><strong>Forever yours,</strong><br>Bebu</p>
            </div>
        </div>
    </div>

</body>
</html>
